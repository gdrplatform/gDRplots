# This workflow uses (triggers) 'pkgdown.yaml' template from gdrplatform/gDRstyle
# See more details at:
# https://github.com/gdrplatform/gDRstyle/blob/main/.github/workflows/pkgdown.yaml

# TODO: cdsrmodels (Suggests) is only on GitHub (broadinstitute/cdsr_models),
# not CRAN/Bioc. Shared workflow fails to install it. Discuss with team.

name: pkgdown

on:
  push:
    branches: [main, master, test_ci_pkgdown]

# jobs:
#   trigger_pkgdown:
#     uses: gdrplatform/gDRstyle/.github/workflows/pkgdown.yaml@main
#     with:
#       USERNAME: ${{ github.actor }}
#       PACKAGE_NAME: ${{ github.event.repository.name }}
#       BRANCH_NAME: ${{ github.head_ref }}
#     secrets: inherit

permissions:
  contents: write

jobs:
  pkgdown:
    runs-on: ubuntu-latest
    concurrency:
      group: pkgdown-${{ github.event_name != 'pull_request' || github.run_id }}
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup R
        uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - name: Install dependencies
        uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: any::pkgdown, broadinstitute/cdsr_models, gdrplatform/gDRutils, gdrplatform/gDRtestData, gdrplatform/gDRstyle
          needs: website

      - name: Build pkgdown site
        run: pkgdown::build_site_github_pages(new_process = FALSE, install = TRUE)
        shell: Rscript {0}

      - name: Deploy to GitHub pages
        uses: JamesIves/github-pages-deploy-action@v4.5.0
        with:
          clean: true
          branch: pages
          folder: docs
          target-folder: docs
